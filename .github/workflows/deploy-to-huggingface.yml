name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Upload repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          if not token:
              raise SystemExit("HF_TOKEN GitHub secret missing")

          api = HfApi(token=token)

          api.upload_folder(
              repo_id="nikhil123789/paperclip-ai-company",
              repo_type="space",
              folder_path=".",
              path_in_repo=".",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "node_modules/*",
                  ".next/*",
                  "dist/*",
                  "build/*",
                  ".env",
                  ".env.*",
                  "*.log"
              ],
          )

          print("Deploy uploaded to Hugging Face Space successfully")
          PY
