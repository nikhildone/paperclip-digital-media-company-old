packages:
  - packages/*
  - packages/adapters/*
  - packages/plugins/*
  # Keep sandbox-provider plugins installable as standalone packages without
  # forcing root pnpm-lock.yaml churn for their third-party deps.
  - "!packages/plugins/sandbox-providers/**"
  # Plugin examples are development and smoke-test fixtures.
  # They are excluded from the production Docker workspace so Render does not
  # build example packages during pnpm -r build.
  - "!packages/plugins/examples/**"
  - server
  - ui
  - cli
