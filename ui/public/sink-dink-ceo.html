<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paperclip SINK-DINK CEO Control</title>
    <style>
      body{margin:0;background:#080b12;color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,sans-serif}main{max-width:1100px;margin:auto;padding:24px}.card{border:1px solid #263245;background:#111827;border-radius:16px;padding:18px;margin:14px 0}.row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric,.pack{border:1px solid #263245;border-radius:12px;padding:12px;background:#0b1220}button{border:1px solid #263245;background:#172033;color:#f8fafc;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}button.primary{background:#22c55e;color:#03120a;border:0}button:disabled{opacity:.6}p,small{color:#a3aec2}.packs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.pill{display:inline-block;margin:6px 5px 0 0;padding:4px 7px;border-radius:999px;background:#1f2937;font-size:12px}a{color:#86efac}@media(max-width:850px){.grid,.packs{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="row">
          <div>
            <small>SINK-DINK CEO Control Room</small>
            <h1>Start CEO Production Batch</h1>
            <p>Blank dashboard ko bypass karke working AI campaign engine se 10 upload-ready packs generate karo.</p>
          </div>
          <div class="row">
            <button id="statusBtn">Check Status</button>
            <button id="startBtn" class="primary">Start CEO Batch</button>
            <button id="downloadBtn" disabled>Download JSON</button>
          </div>
        </div>
        <div class="grid">
          <div class="metric"><small>Engine</small><h3 id="engine">Not checked</h3></div>
          <div class="metric"><small>Gemini</small><h3 id="gemini">NA</h3></div>
          <div class="metric"><small>Worker</small><h3 id="worker">NA</h3></div>
          <div class="metric"><small>Last Batch</small><h3 id="batchId">None</h3></div>
        </div>
      </section>
      <section id="error" class="card" style="display:none;color:#fecaca"></section>
      <section id="summary" class="card" style="display:none"></section>
      <section id="results" class="card" style="display:none"></section>
      <section class="card"><h2>Debug</h2><pre id="debug">Ready</pre></section>
    </main>
    <script src="/sink-dink-ceo.js"></script>
  </body>
</html>
